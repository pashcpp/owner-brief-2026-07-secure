    async function decrypt(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        new TextEncoder().encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      const key = await crypto.subtle.deriveKey(
        { name:"PBKDF2", salt:fromBase64(payload.salt), iterations:payload.iterations, hash:"SHA-256" },
        material,
        { name:"AES-GCM", length:256 },
        false,
        ["decrypt"]
      );
      const plaintext = await crypto.subtle.decrypt(
        { name:"AES-GCM", iv:fromBase64(payload.iv), tagLength:128 },
        key,
        fromBase64(payload.data)
      );
      return new TextDecoder().decode(plaintext);
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();
      status.textContent = "Проверяем пароль…";
      status.style.color = "#5f6d7d";
      button.disabled = true;
      try {
        const report = await decrypt(input.value);
        input.value = "";
        document.open();
        document.write(report);
        document.close();
      } catch {
        status.textContent = "Пароль не подходит. Проверьте символы и попробуйте ещё раз.";
        status.style.color = "#aa3037";
        input.select();
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
